# Alembic configuration for Echo Chamber Detector.
# Override sqlalchemy.url by setting the DATABASE_URL environment variable.

[alembic]
# Path to migration scripts, relative to this file
script_location = alembic

# Default database URL — override with DATABASE_URL env var in production
sqlalchemy.url = postgresql://localhost/echo_chamber

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
